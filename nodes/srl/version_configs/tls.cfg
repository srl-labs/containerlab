set / system tls profile clab-profile
set / system tls profile clab-profile key "{{ .TLSKey }}"
set / system tls profile clab-profile certificate "{{ .TLSCert }}"
{{- if .TLSAnchor }}
set / system tls profile clab-profile authenticate-client true
set / system tls profile clab-profile trust-anchor "{{ .TLSAnchor }}"
{{- else }}
set / system tls profile clab-profile authenticate-client false
{{- end }}
