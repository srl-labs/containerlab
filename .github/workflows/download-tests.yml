name: download-tests

"on":
  workflow_call:
    inputs:
      py_ver:
        required: true
        type: string
      uv_ver:
        required: true
        type: string
      runtime:
        type: string
        default: "docker"

jobs:
  download-tests:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        test-suite:
          - "*.robot"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: containerlab

      - name: Move containerlab to usr/bin
        run: sudo mv ./containerlab /usr/bin/containerlab && sudo chown root:root /usr/bin/containerlab && sudo chmod 4755 /usr/bin/containerlab

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ inputs.uv_ver }}
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Activate virtualenv
        run: |
          . .venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize test-suite name
        run: echo "TEST_SUITE=$(echo ${{ matrix.test-suite }} | tr -d '*')" >> $GITHUB_ENV

      - name: Run tests
        run: |
          bash ./tests/rf-run.sh ${{ inputs.runtime }} ./tests/09-download/${{ matrix.test-suite }}

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: 09-download-log-${{ env.TEST_SUITE }}-${{ inputs.runtime }}
          path: ./tests/out/*.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-download-tests-${{ env.TEST_SUITE }}-${{ inputs.runtime }}
          path: /tmp/clab-tests/coverage/*
          retention-days: 7
