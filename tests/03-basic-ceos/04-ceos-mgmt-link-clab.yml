name: 03-04-ceos-mgmt-link

# This lab exercises wiring the cEOS management interface (eth0) as a regular
# link with network-mode: none, in two modes:
#   oob - the management interface is addressed from the link (out-of-band mgmt)
#   ztp - the node boots with no startup-config (suppress-startup-config) so it
#         actually zero-touch provisions; its mgmt interface is wired but
#         unaddressed
# mgmtsw is a regular ceos node acting as the peer for both.
topology:
  kinds:
    arista_ceos:
      image: ceos:4.32.0F
  nodes:
    oob:
      kind: arista_ceos
      network-mode: none
    ztp:
      kind: arista_ceos
      network-mode: none
      suppress-startup-config: true
    mgmtsw:
      kind: arista_ceos

  links:
    - endpoints: [ "oob:eth0", "mgmtsw:eth1" ]
      ipv4: [ "192.168.99.2/24", "192.168.99.1/24" ]
    - endpoints: [ "ztp:eth0", "mgmtsw:eth2" ]
