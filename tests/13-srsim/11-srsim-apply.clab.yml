# yaml-language-server: $schema=../../schemas/clab.schema.json
name: srsim-apply

topology:
  kinds:
    nokia_srsim:
      license: /opt/nokia/sros/license-sros25.txt
      image: registry.srlinux.dev/pub/nokia_srsim:25.10.R2

  nodes:
    client:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link set dev eth1 up
        - ip addr add dev eth1 10.0.1.1/24
{{- if .addLink }}
        - ip link set dev eth2 up
        - ip addr add dev eth2 10.0.2.1/24
{{- end }}
{{- if .addNode }}
        - ip link set dev eth3 up
        - ip addr add dev eth3 10.0.3.1/24
{{- end }}

    sros:
      kind: nokia_srsim
      type: sr-1-92s
      components:
        - slot: A
{{- if .componentChange }}
        - slot: 1
        - slot: 2
{{- else }}
        - slot: 1
{{- end }}
      startup-config: |
        /configure port 1/1/c23 connector breakout c4-100g
        /configure port 1/1/c23 admin-state enable
        /configure port 1/1/c23/4 ethernet mode hybrid
        /configure port 1/1/c23/4 admin-state enable
        /configure port 1/1/c23/3 ethernet mode hybrid
        /configure port 1/1/c23/3 admin-state enable
        /configure router "Base" interface "to-client-1" port 1/1/c23/4:0
        /configure router "Base" interface "to-client-1" ipv4 primary address 10.0.1.2
        /configure router "Base" interface "to-client-1" ipv4 primary prefix-length 24
        /configure router "Base" interface "to-client-2" port 1/1/c23/3:0
        /configure router "Base" interface "to-client-2" ipv4 primary address 10.0.2.2
        /configure router "Base" interface "to-client-2" ipv4 primary prefix-length 24

{{- if .addNode }}
    extra:
      kind: nokia_srsim
      type: sr-1
      startup-config: |
        /configure card 1 card-type iom-1
        /configure card 1 mda 1 mda-type me6-100gb-qsfp28
        /configure port 1/1/c1 connector breakout c1-100g
        /configure port 1/1/c1 admin-state enable
        /configure port 1/1/c1/1 admin-state enable
        /configure router "Base" interface "to-client" port 1/1/c1/1
        /configure router "Base" interface "to-client" ipv4 primary address 10.0.3.2
        /configure router "Base" interface "to-client" ipv4 primary prefix-length 24
{{- end }}

  links:
    - endpoints: ["client:eth1", "sros:1/1/c23/4"]
{{- if .addLink }}
    - endpoints: ["client:eth2", "sros:1/1/c23/3"]
{{- end }}
{{- if .addNode }}
    - endpoints: ["client:eth3", "extra:1/1/c1/1"]
{{- end }}
