name: exited-container-cli
mgmt:
  bridge: 01-27-net

topology:
  nodes:
    l1:
      kind: linux
      image: alpine:3
      restart-policy: "no"
      cmd: nosuchcommand

  links:
    # Host link to the linux node that exits immediately (issue #2284 link / netns path)
    - endpoints: ["l1:eth1", "host:l1-01-27-eth1"]
