name: apply

topology:
  nodes:
    l1:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      exec:
        - ip address add 172.17.0.1/24 dev eth1
        - ip -6 address add 2002::172:17:0:1/96 dev eth1
{{- if .addNode }}
        - ip address add 172.17.1.1/24 dev eth3
        - ip -6 address add 2002::172:17:1:1/96 dev eth3
{{- end }}
    l2:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      exec:
        - ip address add 172.17.0.2/24 dev eth1
        - ip -6 address add 2002::172:17:0:2/96 dev eth1
    n1:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    n2:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    srlc:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    srl1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 172.31.0.2/24
        set / network-instance default interface ethernet-1/1.0
{{- if .addNode }}
    l3:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      exec:
        - ip address add 172.17.1.2/24 dev eth1
        - ip -6 address add 2002::172:17:1:2/96 dev eth1
{{- end }}

  links:
    - endpoints: ["l1:eth1", "l2:eth1"]
    - endpoints: ["n1:eth1", "n2:eth1"]
    - endpoints: ["srlc:eth1", "srl1:e1-1"]
{{- if .addLink }}
    - endpoints: ["l1:eth2", "l2:eth2"]
    - endpoints: ["n1:eth2", "n2:eth2"]
    - endpoints: ["srlc:eth2", "srl1:e1-2"]
{{- end }}
{{- if .addSpecialLinks }}
    - type: host
      host-interface: apphost1
      endpoint:
        node: l1
        interface: host1
    - type: mgmt-net
      host-interface: appmgmt1
      endpoint:
        node: l1
        interface: mgmt1
    - type: dummy
      endpoint:
        node: l2
        interface: dummy1
{{- end }}
{{- if .addNode }}
    - endpoints: ["l1:eth3", "l3:eth1"]
{{- end }}
