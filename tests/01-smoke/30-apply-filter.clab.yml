name: apply-filter

topology:
  nodes:
    provider:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    child1:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      network-mode: container:provider
    child2:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      network-mode: container:provider
    unrelated1:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    unrelated2:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
{{- if .addGroup }}
    new-provider:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
    new-child1:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      network-mode: container:new-provider
    new-child2:
      kind: linux
      image: alpine:3
      cmd: tail -f /dev/null
      network-mode: container:new-provider
{{- end }}

  links:
    - endpoints: ["provider:eth1", "unrelated1:eth1"]
    - endpoints: ["unrelated1:eth2", "unrelated2:eth1"]
{{- if .addGroup }}
    - endpoints: ["new-provider:eth1", "unrelated2:eth2"]
{{- end }}
